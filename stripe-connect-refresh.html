<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payout setup link expired | iSwing</title>
    <meta
      name="description"
      content="Your Stripe payout setup link has expired. Return to iSwing to continue setup."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="return-page">
    <main class="return-shell">
      <section class="return-card">
        <div class="return-mark warning">!</div>
        <p class="eyebrow">Stripe Connect</p>
        <h1>Setup link expired</h1>
        <p>
          For your security, Stripe setup links expire after a short time.
          Return to iSwing and tap Continue to Stripe again to resume setup.
        </p>
        <div class="cta">
          <a class="button primary" href="iswing://stripe-connect-refresh">
            Return to iSwing
          </a>
          <a class="button secondary" href="index.html">Visit iSwing website</a>
        </div>
        <p class="return-hint">
          If the app does not open automatically, switch back to iSwing manually.
        </p>
      </section>
    </main>
  </body>
</html>

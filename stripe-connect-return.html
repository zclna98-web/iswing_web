<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payout setup submitted | iSwing</title>
    <meta
      name="description"
      content="Your iSwing payout setup has been submitted through Stripe."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="return-page">
    <main class="return-shell">
      <section class="return-card">
        <div class="return-mark success">✓</div>
        <p class="eyebrow">Stripe Connect</p>
        <h1>Payout setup submitted</h1>
        <p>
          You can now return to iSwing. Your payout status may take a moment to
          update while Stripe finishes verification.
        </p>
        <div class="cta">
          <a class="button primary" href="iswing://stripe-connect-return">
            Return to iSwing
          </a>
          <a class="button secondary" href="index.html">Visit iSwing website</a>
        </div>
        <p class="return-hint">
          If the app does not open automatically, switch back to iSwing manually.
        </p>
      </section>
    </main>
  </body>
</html>
